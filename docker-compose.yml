version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hareware_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hareware}
      PGPORT: 5433
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hareware_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5433/${POSTGRES_DB:-hareware}
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_change_in_production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://service-system.hareware.com.br/api/v1}
    container_name: hareware_frontend
    ports:
      - "3004:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://service-system.hareware.com.br/api/v1}

    # Wait for backend to avoid immediate connection race conditions initially (optional but good practice)
    depends_on:
      - backend

volumes:
  postgres_data:
